- name: "Mana value exactly 0"
  query: "cmc=0 t:artifact"
  scryfall_query: "cmc=0 t:artifact include:extras"
  assertions:
    contains:
      - "Ornithopter"
      - "Mox Pearl"
    count_min: 100

- name: "Mana value greater than 10"
  query: "cmc>10 t:creature"
  scryfall_query: "cmc>10 t:creature include:extras"
  assertions:
    contains:
      - "Emrakul, the Aeons Torn"
    count_min: 10

- name: "Mana exact match 5UU (Issue #45)"
  query: "mana=5uu"
  scryfall_query: "mana=5uu"
  assertions:
    count_min: 90
    count_max: 105

- name: "Compound mana: subset + strict superset + name"
  query: "mana<=1w mana>w name:kje"
  scryfall_query: "mana<=1w mana>w name:kje"
  assertions:
    count: 4
