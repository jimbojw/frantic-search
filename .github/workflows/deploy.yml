# SPDX-License-Identifier: Apache-2.0
name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

permissions:
  contents: read
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      # -- ETL --
      - name: Restore data from previous deployment
        run: >-
          npm run etl -- restore
          --site-url https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/
          --verbose
        continue-on-error: true

      - name: Restore Scryfall data cache
        id: scryfall-cache
        uses: actions/cache@v5
        with:
          path: data/raw
          key: scryfall-oracle-cards-${{ github.run_id }}
          restore-keys: |
            scryfall-oracle-cards-

      - name: Download Oracle Cards
        run: npm run etl -- download

      - name: Download Scryfall tags
        run: npm run etl -- download-tags --verbose

      - name: Download MTGJSON AtomicCards
        run: npm run etl -- download-mtgjson --verbose

      - name: Download TCGCSV Magic data
        run: npm run etl -- download-tcgcsv --verbose

      - name: Restore ThumbHash cache
        uses: actions/cache@v5
        with:
          path: data/thumbhash
          key: thumbhash-manifest-${{ github.run_id }}
          restore-keys: |
            thumbhash-manifest-

      - name: Generate ThumbHashes
        run: npm run etl -- thumbhash --verbose

      - name: Upload ThumbHash manifests
        uses: actions/upload-artifact@v5
        with:
          name: thumbhash-manifests
          path: data/thumbhash/

      - name: Process card data
        run: npm run etl -- process

      # -- App --
      - name: Build app
        run: npm run build -w app
        env:
          VITE_POSTHOG_KEY: ${{ secrets.VITE_POSTHOG_KEY }}
          VITE_POSTHOG_HOST: ${{ secrets.VITE_POSTHOG_HOST }}
          VITE_TCGPLAYER_IMPACT_ID: ${{ secrets.TCGPLAYER_IMPACT_ID }}
          VITE_TCGPLAYER_AD_ID: ${{ secrets.TCGPLAYER_AD_ID }}
          VITE_TCGPLAYER_PARTNER_SEGMENT: ${{ secrets.TCGPLAYER_PARTNER_SEGMENT }}
          VITE_MANA_POOL_REF: ${{ secrets.MANA_POOL_ID }}

      # -- Deploy --
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: app/dist

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
